name: ci

# 두 job 모두 읽기 전용이다 - 토큰 범위를 최소화하고 checkout 의 자격증명 잔존도 끈다.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run shellcheck on all shell assets
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -name '*.sh' -not -path './.git/*' | sort)
          files+=("hooks/commit-msg")
          echo "shellcheck targets:"
          printf '  %s\n' "${files[@]}"
          shellcheck "${files[@]}"

  block-test:
    name: block-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run healthcheck.sh self-test
        run: ./blocks/healthcheck.test.sh
